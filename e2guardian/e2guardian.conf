# e2guardian.conf — v5.x syntax
# Keep this minimal: only override what differs from compiled-in defaults.
# Language, template, and list paths use image defaults to avoid path errors.

# ── Network ───────────────────────────────────────────────────────────────────
filterip   =               # listen on all interfaces
filterport = 8080

# Upstream proxy (Squid service)
proxyip    = squid
proxyport  = 3128

# ── Process ───────────────────────────────────────────────────────────────────
nodaemon   = on            # foreground mode required for Docker

# ── Logging ───────────────────────────────────────────────────────────────────
# loglevel: 0=none 1=blocked only 2=all requests
loglevel   = 2
logdir     = '/var/log/e2guardian'
loglocation = '/var/log/e2guardian/access.log'

# ── Language (must be explicit — compiled-in default for language is empty) ───
languagedir  = '/usr/share/e2guardian/languages'
language     = 'ukenglish'

# ── Download managers (at least one required) ─────────────────────────────────
downloadmanager = '/etc/e2guardian/downloadmanagers/default.conf'

# ── Filter groups ─────────────────────────────────────────────────────────────
filtergroups = 1

# Extra - do not remove
prefer_ip4 = on
