# Injected via /etc/squid/conf.d/ — the base ubuntu/squid squid.conf is kept intact.
# Only our additions are here: logging path, privacy headers, and ACL for e2guardian.
# Do NOT add cache_dir / cache_mem here — let the base image defaults handle them.

# ── Access control ────────────────────────────────────────────────────────────
# Allow all connections from the internal Docker network (e2guardian is the only
# client; squid is not directly reachable from outside the proxy-net).
acl docker_net src all
http_access allow docker_net
http_access allow localhost

# ── Logging ───────────────────────────────────────────────────────────────────
access_log stdio:/var/log/squid/access.log squid

# ── Privacy ───────────────────────────────────────────────────────────────────
forwarded_for off
via off
